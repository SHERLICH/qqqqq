<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>首页</title>
    <meta name="color-scheme" content="light" />
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        theme: {
          extend: {
            boxShadow: {
              soft: "0 10px 30px rgba(0,0,0,0.10)",
            },
          },
        },
      };
    </script>
    <style>
      html,
      body {
        height: 100%;
      }
    </style>
  </head>
  <body class="min-h-dvh bg-gray-50 text-slate-900 antialiased">
    <div id="root" class="min-h-dvh"></div>

    <script>
      (function () {
        if (location.protocol !== "file:") return;
        var el = document.getElementById("root");
        el.innerHTML =
          '<div style="font-family:system-ui,-apple-system,Segoe UI,Roboto,Helvetica,Arial,sans-serif;padding:24px;max-width:560px;margin:0 auto;line-height:1.6;color:#0f172a">' +
          '<h1 style="font-size:18px;margin:0 0 12px;font-weight:650">当前是 file:// 打开方式，页面会白屏</h1>' +
          '<p style="margin:0 0 12px;color:#475569">原因：浏览器会阻止在 <code style="background:#f1f5f9;padding:2px 6px;border-radius:6px">file://</code> 下加载本地 <code style="background:#f1f5f9;padding:2px 6px;border-radius:6px">.mjs</code> 模块（<code style="background:#f1f5f9;padding:2px 6px;border-radius:6px">import \"./home.mjs\"</code> 会失败）。</p>' +
          '<p style="margin:0 0 12px;color:#475569"><b>解决</b>：在本文件夹运行本地静态服务，然后用 <code style="background:#f1f5f9;padding:2px 6px;border-radius:6px">http://127.0.0.1:5173/</code> 打开。</p>' +
          '<pre style="background:#0b1220;color:#e2e8f0;padding:14px;border-radius:12px;overflow:auto;font-size:13px;line-height:1.45">node serve.mjs</pre>' +
          '<p style="margin:12px 0 0;color:#475569">也可以双击运行 <code style="background:#f1f5f9;padding:2px 6px;border-radius:6px">start.bat</code>（需要系统 PATH 里能运行 <code style="background:#f1f5f9;padding:2px 6px;border-radius:6px">node</code>）。</p>' +
          "</div>";
      })();
    </script>

    <script type="module">
      import React from "https://esm.sh/react@18.3.1";
      import { createRoot } from "https://esm.sh/react-dom@18.3.1/client";
      import Home from "./home.mjs";
      import RegisterPage from "./register.mjs";
      import MatchPage from "./match.mjs";
      import ChatPage from "./chat.mjs";
      import ProfilePage from "./profile.mjs";

      const root = createRoot(document.getElementById("root"));

      function renderRoute() {
        const h = window.location.hash;
        if (h === "#register") {
          document.body.className = "min-h-dvh bg-white text-slate-900 antialiased";
          document.title = "注册并登录";
          root.render(React.createElement(RegisterPage));
          return;
        }
        if (h === "#profile") {
          document.body.className = "min-h-dvh bg-gray-50 text-slate-900 antialiased";
          document.title = "我的 · Circle";
          root.render(React.createElement(ProfilePage));
          return;
        }
        if (h === "#match") {
          document.body.className = "min-h-dvh bg-gray-50 text-slate-900 antialiased";
          document.title = "匹配 · Circle";
          root.render(React.createElement(MatchPage));
          return;
        }
        if (h === "#chat") {
          document.body.className = "min-h-dvh bg-gray-50 text-slate-900 antialiased";
          document.title = "消息 · Circle";
          root.render(React.createElement(ChatPage));
          return;
        }
        document.body.className = "min-h-dvh bg-gray-50 text-slate-900 antialiased";
        document.title = "首页 · Circle";
        root.render(React.createElement(Home));
      }

      /** 全局导航（注册页 / 底栏等调用） */
      window.__circleNavigate = {
        toHome() {
          if (window.location.hash) {
            history.replaceState(
              null,
              "",
              `${window.location.pathname}${window.location.search}`
            );
          }
          renderRoute();
        },
        toRegister() {
          window.location.hash = "#register";
        },
        toMatch() {
          window.location.hash = "#match";
        },
        toChat() {
          window.location.hash = "#chat";
        },
        toProfile() {
          window.location.hash = "#profile";
        },
      };

      window.addEventListener("hashchange", renderRoute);
      renderRoute();
    </script>
  </body>
</html>
